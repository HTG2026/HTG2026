# Deploys to Vercel when Git webhooks don't fire.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# See docs/VERCEL_NO_DEPLOY_FIX.md
#
# We use `vercel deploy --prod` so the build runs on Vercel (not in GitHub).
# The old `vercel build` + `deploy --prebuilt` path often breaks in Actions.

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::Add GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID — see docs/VERCEL_NO_DEPLOY_FIX.md"
            exit 1
          fi

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '%s' '{"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}' > .vercel/project.json

      - name: Deploy to production (build on Vercel)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx vercel@latest deploy --prod --token="$VERCEL_TOKEN" --yes
